title: "Net-Archive"
description: "Net-Archive is a site where I put docs that provide guidance on using software."
remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "dark"

plugins:
  - jekyll-remote-theme
  - jekyll-include-cache

# Navigation
nav:
  - title: "Home"
    url: /
  - title: "About"
    url: /about/
  - title: "Posts"
    url: /posts/
  - title: "Docs"
    url: /docs/

author:
  name: "ernugraha"
  avatar: "/assets/images/avatar.png"

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: single
      author_profile: true
      css: "/assets/css/custom.css"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: single
      author_profile: true
      css: "/assets/css/custom.css"

collections:
  pages:
    output: true
    permalink: /:path/

atom_feed:
  hide: true

footer:
  custom: custom-footer
  text: ""
  links: []

sass:
  style: compressed
